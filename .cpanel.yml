---
deployment:
  tasks:
    - export DEPLOYPATH=/home/ccgltdac/public_html/ccgrupo.com.co
    # Copia el build de Vite (HTML prerendered + assets) al docroot.
    - /bin/cp -R dist/* $DEPLOYPATH
    # El subdirectorio dist/server es del build SSR de Node — no se usa
    # en hosting estático. Se borra para no dejar archivos sobrantes.
    - /bin/rm -rf $DEPLOYPATH/server
