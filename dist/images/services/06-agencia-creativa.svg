<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <rect width="1200" height="800" fill="#0b1628"/>
  <rect width="1200" height="800" fill="url(#g6)"/>
  <defs>
    <linearGradient id="g6" x1="1200" y1="0" x2="0" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0f1d35"/>
    </linearGradient>
    <linearGradient id="brush" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Grid backdrop (design canvas hint) -->
  <g stroke="#00b4d8" stroke-opacity="0.05" stroke-width="1">
    <line x1="300" y1="200" x2="300" y2="600"/>
    <line x1="450" y1="200" x2="450" y2="600"/>
    <line x1="600" y1="200" x2="600" y2="600"/>
    <line x1="750" y1="200" x2="750" y2="600"/>
    <line x1="900" y1="200" x2="900" y2="600"/>
    <line x1="300" y1="280" x2="900" y2="280"/>
    <line x1="300" y1="400" x2="900" y2="400"/>
    <line x1="300" y1="520" x2="900" y2="520"/>
  </g>

  <!-- Layered design composition: circle + square + triangle overlapping -->
  <!-- Cyan square -->
  <rect x="380" y="280" width="220" height="220" rx="12" stroke="#00b4d8" stroke-width="2" fill="#00b4d8" fill-opacity="0.06" stroke-opacity="0.55"/>
  <!-- Magenta circle (creative accent) -->
  <circle cx="640" cy="380" r="120" stroke="#ff5e8a" stroke-width="2" fill="#ff5e8a" fill-opacity="0.05" stroke-opacity="0.45"/>
  <!-- Amber triangle -->
  <polygon points="700,460 820,460 760,560" stroke="#ffd23f" stroke-width="2" fill="#ffd23f" fill-opacity="0.05" stroke-opacity="0.5"/>

  <!-- Paint brush stroke -->
  <path d="M250 620 Q 500 540, 760 600 T 1000 580" stroke="url(#brush)" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Color palette dots -->
  <g>
    <circle cx="200" cy="220" r="16" fill="#ff5e8a" opacity="0.7"/>
    <circle cx="200" cy="262" r="16" fill="#ff9a3c" opacity="0.7"/>
    <circle cx="200" cy="304" r="16" fill="#ffd23f" opacity="0.7"/>
    <circle cx="200" cy="346" r="16" fill="#4ade80" opacity="0.7"/>
    <circle cx="200" cy="388" r="16" fill="#38bdf8" opacity="0.7"/>
    <circle cx="200" cy="430" r="16" fill="#8b5cf6" opacity="0.7"/>
    <rect x="180" y="200" width="40" height="252" rx="20" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1" fill="none"/>
  </g>

  <!-- Pen tool node -->
  <g transform="translate(950, 250)">
    <circle r="6" fill="#00b4d8" opacity="0.9"/>
    <line x1="0" y1="0" x2="-30" y2="-20" stroke="#00b4d8" stroke-width="1.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="30" y2="20" stroke="#00b4d8" stroke-width="1.5" opacity="0.5"/>
    <circle cx="-30" cy="-20" r="4" stroke="#00b4d8" stroke-width="1.5" fill="#0b1628" opacity="0.7"/>
    <circle cx="30" cy="20" r="4" stroke="#00b4d8" stroke-width="1.5" fill="#0b1628" opacity="0.7"/>
  </g>

  <!-- Typographic accent "Aa" -->
  <text x="490" y="430" font-family="serif" font-size="120" fill="#00b4d8" opacity="0.25" font-style="italic">Aa</text>

  <!-- Layers indicator (right) -->
  <g transform="translate(960, 420)">
    <rect width="120" height="14" rx="3" fill="#00b4d8" fill-opacity="0.18" stroke="#00b4d8" stroke-opacity="0.35" stroke-width="1"/>
    <rect y="22" width="120" height="14" rx="3" fill="#00b4d8" fill-opacity="0.12" stroke="#00b4d8" stroke-opacity="0.25" stroke-width="1"/>
    <rect y="44" width="120" height="14" rx="3" fill="#00b4d8" fill-opacity="0.08" stroke="#00b4d8" stroke-opacity="0.2" stroke-width="1"/>
    <rect y="66" width="120" height="14" rx="3" fill="#00b4d8" fill-opacity="0.06" stroke="#00b4d8" stroke-opacity="0.15" stroke-width="1"/>
  </g>

  <!-- Label -->
  <text x="600" y="720" text-anchor="middle" font-family="monospace" font-size="13" fill="#00b4d8" opacity="0.5" letter-spacing="6">AGENCIA CREATIVA — IDENTIDAD &amp; CONTENIDO</text>
</svg>
