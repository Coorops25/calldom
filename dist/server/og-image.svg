<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060d1f"/>
      <stop offset="100%" style="stop-color:#0b1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Teal glow circle -->
  <circle cx="900" cy="200" r="300" fill="#00b4d8" opacity="0.05"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="3" height="470" fill="url(#accent)" opacity="0.5" rx="2"/>

  <!-- Badge -->
  <rect x="110" y="90" width="280" height="28" rx="14" fill="#00b4d8" fill-opacity="0.12"/>
  <rect x="110" y="90" width="280" height="28" rx="14" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>
  <text x="250" y="109" text-anchor="middle" font-family="monospace,sans-serif" font-size="11" fill="#00b4d8" letter-spacing="2">BPO DE NUEVA GENERACIÓN</text>

  <!-- Main headline -->
  <text x="110" y="200" font-family="Georgia,serif" font-size="68" font-weight="400" fill="#ffffff" letter-spacing="-1">Tecnología para</text>
  <text x="110" y="278" font-family="Georgia,serif" font-size="68" font-weight="400" fill="#ffffff" letter-spacing="-1">crecer,</text>
  <text x="110" y="356" font-family="Georgia,serif" font-size="68" font-weight="400" font-style="italic" fill="#00b4d8" letter-spacing="-1">experiencias que</text>
  <text x="110" y="434" font-family="Georgia,serif" font-size="68" font-weight="400" font-style="italic" fill="#00b4d8" letter-spacing="-1">conectan.</text>

  <!-- Services row -->
  <text x="110" y="510" font-family="monospace,sans-serif" font-size="13" fill="#ffffff" opacity="0.5" letter-spacing="1">CX  ·  LEADS &amp; VENTAS  ·  AGENTES AUTÓNOMOS  ·  DIGITAL STUDIO</text>

  <!-- Divider -->
  <line x1="110" y1="530" x2="700" y2="530" stroke="#00b4d8" stroke-width="1" opacity="0.3"/>

  <!-- Brand name -->
  <text x="110" y="560" font-family="monospace,sans-serif" font-size="13" fill="#00b4d8" letter-spacing="3">CCGRUPO.COM.CO</text>
  <text x="110" y="580" font-family="monospace,sans-serif" font-size="11" fill="#ffffff" opacity="0.4" letter-spacing="1">+15 AÑOS · BOGOTÁ, COLOMBIA</text>

  <!-- Logo mark right side -->
  <rect x="980" y="240" width="120" height="120" rx="20" fill="#060d1f" stroke="#00b4d8" stroke-width="2" opacity="0.6"/>
  <text x="1040" y="313" text-anchor="middle" font-family="monospace,sans-serif" font-size="28" font-weight="700" fill="#00b4d8" letter-spacing="1">CCG</text>
</svg>
