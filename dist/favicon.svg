  <!-- C — left bar -->
  <rect x="5" y="16" width="5" height="30" rx="2" fill="#00b4d8"/>
  <!-- C — top bar -->
  <rect x="5" y="16" width="23" height="5" rx="2" fill="#00b4d8"/>
  <!-- C — bottom bar -->
  <rect x="5" y="41" width="23" height="5" rx="2" fill="#00b4d8"/>

  <!-- D — left bar -->
